<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-body">
                <h3 class="card-title text-center">Chat with Peer</h3>
                <p class="text-center text-muted">Connected to: {{ to_ip }}</p>
                <button id="disconnect" class="btn btn-danger btn-sm float-end">Disconnect</button>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check form-check-inline">
                        <label for="toggle-encrypted" class="form-check-label">Show Encrypted Messages</label>
                        <input type="checkbox" id="toggle-encrypted" class="form-check-input">
                    </div>
                </div>
                <div id="chat-box" class="border p-3 mb-3" style="height: 300px; overflow-y: auto;">
                    <!-- Chat messages will appear here -->
                </div>
                <form id="chat-form">
                    <div class="input-group">
                        <input type="text" id="chat-message" class="form-control" placeholder="Type your message..." required>
                        <button type="submit" class="btn btn-primary">Send</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function mount_message(message, type) {
            const messageDiv = $('<div></div>').text(message).css({
                maxWidth: '70%',
                wordWrap: 'break-word',
                padding: '10px',
                borderRadius: '15px',
                fontSize: '14px',
                color: ['their', 'crypt'].includes(type) ? 'black' : 'white',
                backgroundColor:
                    type === 'our' ? '#72E359' :
                    type === 'their' ? '#e0e0e0' :
                    type === 'crypt' ? '#586F6B' :
                    'red',
            });

            if (type === 'crypt') {
                messageDiv.addClass('encrypted-message');
            }

            const parentDiv = $('<div></div>').css({
                width: '100%',
                display: 'flex',
                paddingBottom: '10px',
                justifyContent: ['their', 'crypt'].includes(type) ? 'flex-start' : 'flex-end',
            });

            const chatbox = $('#chat-box');

            parentDiv.append(messageDiv);
            chatbox.append(parentDiv);

            chatbox.scrollTop(chatbox[0].scrollHeight);
        }

        $(document).ready(function () {
            const socket = io();
            const peerIp = "{{ to_ip }}";  // Get the peer's IP from the server

            // Handle form submission
            $('#chat-form').on('submit', function (event) {
                event.preventDefault();

                const message = $('#chat-message').val().trim();
                if (!message) return;

                socket.emit('chat_send_message', { message, to_ip: peerIp });

                $('#chat-message').val('');
            });

            socket.on('chat_send_response', function (data) {
                const type = data.success ? 'our' : 'error';
                mount_message(data.message, type);                 
            });

            socket.on('chat_receive_message', function (data) {
                mount_message(data.message, 'crypt');              
                mount_message(data.d_message, 'their');
            });

            socket.on('goto_index', function (data) { window.location.href = `/`; });

            const disconnect = () => {
                socket.emit('disconnect_peer', { peer_ip: peerIp });
            }

            $('#disconnect').on('click', disconnect);
            $(window).on('beforeunload', disconnect);

            socket.on('connect_response', function (data) {
                Swal.fire({
                    icon: data.success ? 'success' : 'error',
                    title: data.message,
                });
            });

            $('#toggle-encrypted').on('change', function () {
                if ($(this).is(':checked')) {
                    $('.encrypted-message').show();
                } else {
                    $('.encrypted-message').hide();
                }
            });
        });
    </script>
</body>
</html>
