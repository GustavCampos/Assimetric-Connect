<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-body">
                <h3 class="card-title text-center">LAN Chat</h3>
                <p class="text-center text-muted">Your connection address:</p>
                <button id="my-ip" class="text-center btn btn-outline-primary d-block mx-auto">
                    {{ my_ip }}
                </button>
            </div>
        </div>
    </div>

    <div class="container mt-5">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Connect to a peer</h5>
                <form id="connect-form">
                    <label for="peer-ip" class="form-label">Peer connection address</label>
                    <input type="text" name="peer-ip" id="peer-ip" class="form-control" placeholder="Enter peer IP (e.g., Enter peer IP (e.g., 192.168.1.100)192.168.1.100:5000)">
                    <div class="d-flex justify-content-end mt-2">
                        <button type="submit" class="btn btn-primary">Connect</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            const socket = io();

            $('#my-ip').on('click', function () {
                const myIp = $(this).text().trim();
                navigator.clipboard.writeText(myIp).then(() => {
                    Swal.fire({
                        icon: 'success',
                        title: 'Copied!',
                        text: `Your IP address (${myIp}) has been copied to the clipboard.`,
                        timer: 2000,
                        showConfirmButton: false,
                    });
                }).catch((err) => {
                    Swal.fire({
                        icon: 'error',
                        title: 'Failed to Copy',
                        text: 'Could not copy your IP address to the clipboard.',
                    });
                    console.error('Clipboard copy failed:', err);
                });
            });

            $('#connect-form').on('submit', function (event) {
                event.preventDefault();

                const peerIp = $('#peer-ip').val().trim();

                if (!peerIp) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Invalid Input',
                        text: 'Please enter a valid peer IP address.',
                    });
                    return;
                }

                socket.emit('connect_to_peer', { peer_ip: peerIp });

                Swal.fire({
                    icon: 'info',
                    title: 'Connection request sent!',
                    text: `Attempting to connect to ${peerIp}`,
                });
            });

            socket.on('connect_request', function (data) {
                Swal.fire({
                    title: 'Peer connection requested!',
                    text: `Do you want to allow connection with ${data.from_ip}?`,
                    showCancelButton: true,
                    confirmButtonText: 'Yes',
                    cancelButtonText: 'No',
                }).then((result) => {
                    socket.emit('connect_confirmation', {
                        allow: result.isConfirmed, 
                        to_ip: data.from_ip,
                        from_ip: data.to_ip, 
                    });
                });
            });

            socket.on('connect_response', function (data) {
                Swal.fire({
                    icon: data.success ? 'success' : 'error',
                    title: data.message,
                });
            });

            socket.on('goto_chat', function (data) {
                const peerIp = data.to_ip;
                window.location.href = `/chat?peer_ip=${encodeURIComponent(peerIp)}`;
            });
        });
    </script>
</body>
</html>
